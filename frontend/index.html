<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HalluciGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --bg2:        #181c25;
      --bg3:        #1e2230;
      --border:     rgba(255,255,255,0.08);
      --border2:    rgba(255,255,255,0.14);
      --text:       #e8eaf0;
      --muted:      #7a8099;
      --teal:       #1fc98e;
      --teal-dim:   rgba(31,201,142,0.12);
      --amber:      #f5a623;
      --amber-dim:  rgba(245,166,35,0.12);
      --red:        #e05c5c;
      --red-dim:    rgba(224,92,92,0.12);
      --mono:       'IBM Plex Mono', monospace;
      --sans:       'Inter', sans-serif;
      --radius:     8px;
      --radius-lg:  12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 56px 1fr;
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      grid-column: 1 / -1;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: var(--teal);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 16px; height: 16px; color: #0f1117; }
    .logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
    .logo-badge {
      font-size: 10px; font-family: var(--mono);
      background: var(--teal-dim); color: var(--teal);
      padding: 2px 7px; border-radius: 999px;
      border: 1px solid rgba(31,201,142,0.2);
    }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .conn-indicator {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .conn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .conn-dot.ok { background: var(--teal); box-shadow: 0 0 6px rgba(31,201,142,0.5); }
    .conn-dot.err { background: var(--red); }
    .conn-dot.checking { background: var(--amber); animation: pulse .9s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .sidebar-section { display: flex; flex-direction: column; gap: 8px; }
    .sidebar-label {
      font-size: 10px; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      padding: 0 4px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; color: var(--muted); padding: 0 2px; }
    .field input, .field select, .field textarea {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 7px 10px;
      width: 100%;
      transition: border-color .15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: var(--teal);
    }
    .field select option { background: var(--bg3); }
    .field input[type="url"], .field input[type="text"] { font-family: var(--mono); font-size: 12px; }

    .btn-test {
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      padding: 6px 10px;
      display: flex; align-items: center; gap: 5px;
      transition: all .15s;
      width: 100%;
      justify-content: center;
    }
    .btn-test:hover { border-color: var(--teal); color: var(--teal); }

    /* Pipeline steps in sidebar */
    .pipe-steps { display: flex; flex-direction: column; gap: 2px; }
    .pipe-step {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: var(--radius);
      font-size: 12px; color: var(--muted);
      transition: all .2s;
    }
    .pipe-step.active { background: var(--teal-dim); color: var(--teal); }
    .pipe-step.done { color: var(--teal); }
    .pipe-step.error { color: var(--red); }
    .pipe-dot-sm {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
      opacity: 0.5;
    }
    .pipe-step.active .pipe-dot-sm,
    .pipe-step.done .pipe-dot-sm { opacity: 1; }

    /* History */
    .history-list { display: flex; flex-direction: column; gap: 4px; }
    .history-item {
      padding: 7px 10px; border-radius: var(--radius);
      background: var(--bg3); border: 1px solid var(--border);
      cursor: pointer; transition: border-color .15s;
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px;
    }
    .history-item:hover { border-color: var(--border2); }
    .history-prompt {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1;
    }
    .history-score { font-size: 11px; font-family: var(--mono); font-weight: 500; flex-shrink: 0; }
    .empty-history { font-size: 12px; color: var(--muted); padding: 4px 8px; }

    /* ── Main area ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .main-inner {
      flex: 1;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 860px;
      width: 100%;
    }

    /* Prompt card */
    .prompt-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .prompt-card textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 12px 14px;
      resize: vertical;
      min-height: 90px;
      transition: border-color .15s;
    }
    .prompt-card textarea:focus { outline: none; border-color: var(--teal); }
    .prompt-card textarea::placeholder { color: var(--muted); }

    .prompt-actions {
      display: flex; align-items: center; gap: 10px;
      margin-top: 12px; flex-wrap: wrap;
    }
    .btn-analyze {
      background: var(--teal);
      border: none;
      border-radius: var(--radius);
      color: #0f1117;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      padding: 9px 22px;
      display: flex; align-items: center; gap: 7px;
      transition: opacity .15s;
    }
    .btn-analyze:hover { opacity: .85; }
    .btn-analyze:disabled { opacity: .35; cursor: not-allowed; }
    .status-msg {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid var(--border2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-text { font-size: 12px; color: var(--red); margin-top: 8px; line-height: 1.5; }

    /* Results */
    .results-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    .tab {
      padding: 11px 18px;
      font-size: 13px; color: var(--muted);
      cursor: pointer; border: none; background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.on { color: var(--teal); border-bottom-color: var(--teal); }

    .tab-body { padding: 20px; }

    /* Score overview */
    .score-hero {
      display: flex; align-items: baseline; gap: 14px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .score-big {
      font-size: 48px; font-weight: 600; font-family: var(--mono);
      line-height: 1;
    }
    .score-verdict { font-size: 14px; color: var(--muted); }

    .bar-track {
      height: 6px; border-radius: 999px;
      background: var(--bg3);
      overflow: hidden; margin-bottom: 4px;
    }
    .bar-fill {
      height: 100%; border-radius: 999px;
      transition: width .9s cubic-bezier(.4,0,.2,1);
    }
    .bar-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted);
      font-family: var(--mono);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px; margin-top: 18px;
    }
    .metric {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .metric-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; }
    .metric-value { font-size: 18px; font-weight: 600; font-family: var(--mono); }

    .resp-section { margin-top: 18px; }
    .resp-label { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
    .resp-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 13px; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
      color: var(--text);
    }

    /* Sentences tab */
    .sent-list { display: flex; flex-direction: column; gap: 6px; }
    .sent-item {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .sent-text { font-size: 13px; line-height: 1.6; flex: 1; }
    .sent-score {
      font-size: 11px; font-family: var(--mono); font-weight: 500;
      padding: 3px 9px; border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }

    /* Samples tab */
    .sample-block { margin-bottom: 14px; }
    .sample-num {
      font-size: 10px; font-family: var(--mono); text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin-bottom: 6px;
    }

    /* Device badge */
    .device-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-family: var(--mono);
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 3px 8px;
      color: var(--muted);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 56px auto 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      .main-inner { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- Topbar -->
  <header class="topbar">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
    </div>
    <span class="logo-text">HalluciGuard</span>
    <span class="logo-badge">v1.0</span>
    <div class="topbar-right">
      <div class="conn-indicator">
        <div class="conn-dot" id="connDot"></div>
        <span id="connLabel">not connected</span>
      </div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Backend</div>
      <div class="field">
        <label>Server URL</label>
        <input type="url" id="backendUrl" value="http://localhost:8000" />
      </div>
      <button class="btn-test" onclick="testConnection()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
        Test connection
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Parameters</div>
      <div class="field">
        <label>Scoring method</label>
        <select id="method">
          <option value="bertscore">BERTScore (fast)</option>
          <option value="nli">NLI — DeBERTa (best)</option>
          <option value="mqag">MQAG (disabled)</option>
        </select>
      </div>
      <div class="field">
        <label>Samples</label>
        <select id="nSamples">
          <option value="3">3 samples</option>
          <option value="5" selected>5 samples</option>
          <option value="7">7 samples</option>
          <option value="10">10 samples</option>
        </select>
      </div>
      <div class="field">
        <label>Max tokens</label>
        <select id="maxTokens">
          <option value="100">100</option>
          <option value="200" selected>200</option>
          <option value="300">300</option>
          <option value="500">500</option>
        </select>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Pipeline</div>
      <div class="pipe-steps">
        <div class="pipe-step" id="ps0"><div class="pipe-dot-sm"></div>Prompt received</div>
        <div class="pipe-step" id="ps1"><div class="pipe-dot-sm"></div>GPT-2 generating</div>
        <div class="pipe-step" id="ps2"><div class="pipe-dot-sm"></div>Sampling responses</div>
        <div class="pipe-step" id="ps3"><div class="pipe-dot-sm"></div>SelfCheckGPT scoring</div>
        <div class="pipe-step" id="ps4"><div class="pipe-dot-sm"></div>Results ready</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">History</div>
      <div class="history-list" id="historyList">
        <div class="empty-history">No analyses yet</div>
      </div>
    </div>

  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-inner">

      <!-- Prompt card -->
      <div class="prompt-card">
        <textarea id="promptInput" placeholder="Enter a prompt for GPT-2 to generate text from, e.g. &quot;Tell me about the history of the Eiffel Tower&quot;"></textarea>
        <div class="prompt-actions">
          <button class="btn-analyze" id="runBtn" onclick="runPipeline()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Analyze
          </button>
          <div class="status-msg" id="statusMsg"></div>
        </div>
        <div class="err-text" id="errMsg" style="display:none"></div>
      </div>

      <!-- Results card -->
      <div class="results-card" id="resultsCard" style="display:none">
        <div class="tabs">
          <button class="tab on" onclick="switchTab('overview', this)">Overview</button>
          <button class="tab" onclick="switchTab('sentences', this)">Sentences</button>
          <button class="tab" onclick="switchTab('samples', this)">Samples</button>
        </div>

        <div class="tab-body" id="tab-overview">
          <div class="score-hero">
            <span class="score-big" id="scoreBig">—</span>
            <span class="score-verdict" id="scoreVerdict"></span>
          </div>
          <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
          <div class="bar-labels"><span>consistent</span><span>hallucinated</span></div>
          <div class="metrics">
            <div class="metric"><div class="metric-label">Sentences</div><div class="metric-value" id="mSent">—</div></div>
            <div class="metric"><div class="metric-label">Samples</div><div class="metric-value" id="mSamp">—</div></div>
            <div class="metric"><div class="metric-label">Flagged</div><div class="metric-value" id="mFlag">—</div></div>
            <div class="metric"><div class="metric-label">Method</div><div class="metric-value" id="mMeth" style="font-size:13px">—</div></div>
            <div class="metric"><div class="metric-label">Device</div><div class="metric-value" id="mDevice" style="font-size:13px">—</div></div>
          </div>
          <div class="resp-section">
            <div class="resp-label">GPT-2 generated response</div>
            <div class="resp-box" id="respBox"></div>
          </div>
        </div>

        <div class="tab-body" id="tab-sentences" style="display:none">
          <div class="sent-list" id="sentList"></div>
        </div>

        <div class="tab-body" id="tab-samples" style="display:none">
          <div id="sampList"></div>
        </div>
      </div>

    </div>
  </main>

</div>

<script>
  const history = [];

  function setConn(state, label) {
    document.getElementById('connDot').className = 'conn-dot ' + state;
    document.getElementById('connLabel').textContent = label;
  }

  function setPipe(idx, state) {
    document.getElementById('ps' + idx).className = 'pipe-step ' + state;
  }

  function resetPipe() {
    for (let i = 0; i < 5; i++) setPipe(i, '');
  }

  function setStatus(html) {
    document.getElementById('statusMsg').innerHTML = html;
  }

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.style.display = msg ? '' : 'none';
    el.textContent = msg;
  }

  function switchTab(name, el) {
    ['overview', 'sentences', 'samples'].forEach(t => {
      document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
    });
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
  }

  function scoreColor(s) {
    if (s < 0.35) return '#1fc98e';
    if (s < 0.6)  return '#f5a623';
    return '#e05c5c';
  }

  function verdict(s) {
    if (s < 0.25) return 'Highly consistent — low hallucination risk';
    if (s < 0.45) return 'Mostly consistent — minor inconsistencies';
    if (s < 0.65) return 'Moderately inconsistent — possible hallucinations';
    return 'Highly inconsistent — likely hallucinations';
  }

  function sentLabel(s) {
    if (s < 0.35) return { label: 'Consistent',   bg: 'rgba(31,201,142,.15)',  color: '#1fc98e' };
    if (s < 0.6)  return { label: 'Uncertain',     bg: 'rgba(245,166,35,.15)', color: '#f5a623' };
    return               { label: 'Hallucinated',  bg: 'rgba(224,92,92,.15)',  color: '#e05c5c' };
  }

  async function testConnection() {
    const url = document.getElementById('backendUrl').value.trim();
    setConn('checking', 'checking…');
    try {
      const res = await fetch(url + '/health', { signal: AbortSignal.timeout(5000) });
      if (res.ok) {
        const data = await res.json();
        setConn('ok', `connected · ${data.device}`);
      } else {
        setConn('err', 'server error ' + res.status);
      }
    } catch {
      setConn('err', 'cannot reach server');
    }
  }

  async function runPipeline() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) { showErr('Please enter a prompt.'); return; }

    const url       = document.getElementById('backendUrl').value.trim();
    const method    = document.getElementById('method').value;
    const nSamples  = parseInt(document.getElementById('nSamples').value);
    const maxTokens = parseInt(document.getElementById('maxTokens').value);

    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    document.getElementById('resultsCard').style.display = 'none';
    showErr('');
    resetPipe();

    const steps = [
      'Sending prompt…',
      'GPT-2 generating response…',
      'Generating ' + nSamples + ' stochastic samples…',
      'Running SelfCheckGPT (' + method + ')…',
      'Computing scores…',
    ];

    let step = 0;
    function nextStep() {
      if (step > 0) setPipe(step - 1, 'done');
      if (step < 5) {
        setPipe(step, 'active');
        setStatus(`<span class="spinner"></span> ${steps[step]}`);
        step++;
      }
    }
    nextStep();
    const timer = setInterval(() => {
      if (step < 5) nextStep();
      else clearInterval(timer);
    }, 2200);

    try {
      const res = await fetch(url + '/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, n_samples: nSamples, max_new_tokens: maxTokens, method }),
      });

      clearInterval(timer);

      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`Server ${res.status}: ${txt}`);
      }

      const data = await res.json();
      for (let i = 0; i < 5; i++) setPipe(i, 'done');
      setStatus('');
      renderResults(data);
      addHistory(prompt, data.avg_score);

    } catch (e) {
      clearInterval(timer);
      for (let i = 0; i < 5; i++) {
        if (document.getElementById('ps' + i).classList.contains('active')) {
          setPipe(i, 'error'); break;
        }
      }
      setStatus('');
      showErr(
        e.message.includes('fetch') || e.message.includes('reach') || e.message.includes('Failed')
          ? 'Cannot reach the backend. Make sure uvicorn is running:\n  uvicorn app:app --reload --port 8000'
          : e.message
      );
    }

    btn.disabled = false;
  }

  function renderResults(data) {
    const avg = data.avg_score;
    const pct = Math.round(avg * 100);
    const col = scoreColor(avg);

    document.getElementById('scoreBig').textContent   = pct + '%';
    document.getElementById('scoreBig').style.color   = col;
    document.getElementById('scoreVerdict').textContent = verdict(avg);
    document.getElementById('barFill').style.width    = pct + '%';
    document.getElementById('barFill').style.background = col;

    const scores  = data.scores || [];
    const flagged = scores.filter(s => s >= 0.5).length;

    document.getElementById('mSent').textContent   = (data.sentences || []).length;
    document.getElementById('mSamp').textContent   = data.n_samples || nSamples;
    document.getElementById('mFlag').textContent   = flagged;
    document.getElementById('mFlag').style.color   = flagged > 0 ? '#e05c5c' : '#1fc98e';
    document.getElementById('mMeth').textContent   = data.method || '—';
    document.getElementById('mDevice').textContent = data.device || '—';
    document.getElementById('respBox').textContent = data.response || '';

    // Sentences
    const sl = document.getElementById('sentList');
    sl.innerHTML = '';
    (data.sentences || []).forEach((s, i) => {
      const sc = scores[i] || 0;
      const lb = sentLabel(sc);
      const div = document.createElement('div');
      div.className = 'sent-item';
      div.style.borderLeftColor = lb.color;
      div.innerHTML = `
        <span class="sent-text">${s}</span>
        <span class="sent-score" style="background:${lb.bg};color:${lb.color}">
          ${lb.label} ${(sc * 100).toFixed(1)}%
        </span>`;
      sl.appendChild(div);
    });

    // Samples
    const smpl = document.getElementById('sampList');
    smpl.innerHTML = '';
    (data.samples || []).forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'sample-block';
      div.innerHTML = `<div class="sample-num">Sample ${i + 1}</div>
                       <div class="resp-box">${s}</div>`;
      smpl.appendChild(div);
    });

    document.getElementById('resultsCard').style.display = '';
    switchTab('overview', document.querySelector('.tab'));
  }

  function addHistory(prompt, score) {
    history.unshift({ prompt: prompt.slice(0, 45) + (prompt.length > 45 ? '…' : ''), score });
    const list = document.getElementById('historyList');
    list.innerHTML = history.slice(0, 8).map(h => `
      <div class="history-item">
        <span class="history-prompt">${h.prompt}</span>
        <span class="history-score" style="color:${scoreColor(h.score)}">${Math.round(h.score * 100)}%</span>
      </div>`).join('');
  }

  // Test connection on load
  testConnection();
</script>
</body>
</html>
